<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Prevent libraries from crashing when they try to overwrite the read-only window.fetch
      try {
        const _fetch = window.fetch;
        if (_fetch) {
          Object.defineProperty(window, 'fetch', {
            get: () => _fetch,
            set: () => { /* ignore or warn */ },
            configurable: true,
            enumerable: true
          });
        }
      } catch (e) {
        console.error('Failed to patch fetch:', e);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
